apiVersion: v1
kind: ConfigMap
metadata:
  name: payment
  namespace: dotmart
data:
  CART_HOST: "cart"
  CART_PORT: "8080"
  USER_HOST: "user"
  USER_PORT: "8080"
  AMQP_HOST: "rabbitmq"
  AMQP_USER: "dotmart"
  AMQP_PASS: "roboshop123"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: dotmart
  # these are replica set labels 
  labels: 
    project: dotmart
    component: payment
    tier: backend
spec:
  replicas: 1
  selector:
  # these labels are used to select pods
    matchLabels:
      project: dotmart
      component: payment
      tier: backend
  # pod defination 
  template:
    metadata:
      labels:
        project: dotmart
        component: payment
        tier: backend
    spec:
      containers:
      - name: payment
        image: karunakar2000/payment:v3
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: payment
        ports:
        - name: liveness-port
          containerPort: 8080
        readinessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15
        livenessProbe:
          httpGet:
            path: /health
            port: liveness-port
          failureThreshold: 1
          periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: payment
spec:
  selector:
    project: dotmart
    component: payment
    tier: backend
  ports:
    - protocol: TCP
      port: 8080 # service port
      targetPort: 8080 # container port 